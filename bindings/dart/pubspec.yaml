name: revault_api
description: >-
  Typed Dart FFI bindings for encrypted reVault lockboxes, credentials, keys,
  form records, and local vault metadata on Linux, macOS, and Windows.
version: 0.2.0
repository: https://github.com/onepub-dev/reVault
issue_tracker: https://github.com/onepub-dev/reVault/issues
environment:
  sdk: '>=3.10.0 <4.0.0'
dependencies:
  ffi: ^2.1.3
  flat_buffers: ^25.2.10
dev_dependencies:
  lints: ^6.1.0
topics:
  - encryption
  - credentials
  - archive
  - security
  - ffi
platforms:
  linux:
  macos:
  windows:
