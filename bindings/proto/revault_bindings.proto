syntax = "proto3";

package revault.bindings;
option go_package = "github.com/onepub-dev/revault-api-go/messages";

message LockboxEntry {
  string path = 1;
  enum Kind { KIND_UNSPECIFIED = 0; FILE = 1; SYMLINK = 2; DIRECTORY = 3; }
  Kind kind = 2;
  uint64 length = 3;
  uint32 permissions = 4;
}

message LockboxEntryList { repeated LockboxEntry entries = 1; }
message OptionalLockboxEntry { LockboxEntry value = 1; }

message StringList { repeated string values = 1; }
message PathMove { string source = 1; string destination = 2; }
message PathMoveList { repeated PathMove values = 1; }
message ByteList { repeated bytes values = 1; }
message FormField { string id = 1; string label = 2; string kind = 3; bool required = 4; }
message FormFieldList { repeated FormField values = 1; }
message FormDefinition { string type_id = 1; string alias = 2; uint32 revision = 3; string name = 4; string description = 5; repeated FormField fields = 6; }
message FormDefinitionList { repeated FormDefinition values = 1; }
message FormValue { string field_id = 1; string label = 2; string kind = 3; string value = 4; bool secret = 5; }
message FormRecord { string path = 1; string name = 2; string type_id = 3; string definition_alias = 4; uint32 definition_revision = 5; repeated FormValue values = 6; }
message FormRecordList { repeated FormRecord values = 1; }
message OptionalFormRecord { FormRecord value = 1; }
message OptionalFormValue { FormValue value = 1; }
message RecoveryReport { repeated LockboxEntry intact_files = 1; uint64 intact_file_count = 2; uint64 partial_files = 3; uint64 corrupt_records = 4; bool toc_recovered = 5; bool variables_recovered = 6; uint64 variable_count = 7; bool forms_recovered = 8; uint64 form_definition_count = 9; uint64 form_record_count = 10; }
message KeySlot { uint64 id = 1; string protection = 2; string algorithm = 3; }
message KeySlotList { repeated KeySlot values = 1; }
message CacheStats { uint64 limit_bytes = 1; uint64 used_bytes = 2; uint64 entries = 3; uint64 hits = 4; uint64 misses = 5; }
message ImportStats { string host_stat_nanos = 1; string host_read_nanos = 2; string frame_prepare_nanos = 3; string page_write_nanos = 4; }
message PageObject { uint64 id = 1; string kind = 2; uint64 payload_len = 3; }
message PageInspection { uint64 offset = 1; uint64 page_id = 2; uint64 sequence = 3; uint64 page_size = 4; uint64 encrypted_body_len = 5; uint64 unused_bytes = 6; uint64 object_count = 7; repeated PageObject objects = 8; }
message PageInspectionList { repeated PageInspection values = 1; }
message FileInspection { bytes lockbox_id = 1; bool header_readable = 2; uint64 key_directory_generation = 3; uint64 key_directory_copy_count = 4; bool owner_signed = 5; repeated KeySlot key_slots = 6; }
message ProfileGeneration { uint32 index = 1; string status = 2; bytes contact_fingerprint = 3; uint64 created_at_unix_ms = 4; uint64 retired_at_unix_ms = 5; bool has_retired_at = 6; }
message ProfileHistory { string name = 1; uint32 active_generation = 2; repeated ProfileGeneration generations = 3; }
message KnownLockbox { bytes lockbox_id = 1; string path = 2; uint64 last_seen_unix_ms = 3; }
message KnownLockboxList { repeated KnownLockbox values = 1; }
message AccessSlotLabel { bytes lockbox_id = 1; uint64 slot_id = 2; string name = 3; uint64 updated_at_unix_ms = 4; }
message AccessSlotLabelList { repeated AccessSlotLabel values = 1; }
message StreamChunk { string path = 1; uint64 file_offset = 2; uint64 length = 3; uint64 physical_offset = 4; bool sparse = 5; bytes data = 6; }
message StreamChunkList { repeated StreamChunk values = 1; }
message RuntimeOptions { string workload_profile = 1; string worker_policy = 2; }
message Variable { string name = 1; string sensitivity = 2; }
message VariableList { repeated Variable values = 1; }
message OptionalString { bool present = 1; string value = 2; }
message OwnerInspection { bool signed = 1; string fingerprint = 2; bool has_fingerprint = 3; }
message Contact { string name = 1; bytes key = 2; }
message ContactList { repeated Contact values = 1; }
message ProfileHistoryList { repeated ProfileHistory values = 1; }
message AgentEntry { string id = 1; string path = 2; }
message AgentEntryList { repeated AgentEntry values = 1; }
message SleepSupport { bool suspend_notifications = 1; bool sleep_inhibition = 2; bool supported = 3; }
message PlatformStatus { bool supported = 1; bool disabled = 2; string scope = 3; string backend = 4; string item = 5; }
message StringValue { string value = 1; }
message VaultBackupManifest { uint32 format_version = 1; uint64 created_at_unix_ms = 2; string vault_file_name = 3; uint64 vault_size = 4; string vault_sha256 = 5; }
message ErrorDetails { string category = 1; string artifact_kind = 2; uint32 found_version = 3; uint32 supported_version = 4; string message = 5; string guidance = 6; }
