name: Agent IPC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_BACKTRACE: 1

on:
  workflow_dispatch:
  push:
    paths:
      - "rust/revault_vault_api/**"
      - "rust/revault_cli/src/main.rs"
      - "rust/revault_cli/src/commands/**"
      - "rust/revault_cli/tests/agent_flow.rs"
      - ".github/workflows/windows-agent-ipc.yml"
  pull_request:
    paths:
      - "rust/revault_vault_api/**"
      - "rust/revault_cli/src/main.rs"
      - "rust/revault_cli/src/commands/**"
      - "rust/revault_cli/tests/agent_flow.rs"
      - ".github/workflows/windows-agent-ipc.yml"

permissions:
  contents: read

jobs:
  agent-ipc:
    name: ${{ matrix.os }} agent IPC smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build agent security checker
        run: cargo build -p revault_cli --bin lockbox

      - name: Run agent IPC smoke
        run: cargo test -p revault_cli --test agent_flow

      - name: Verify agent transport security
        if: runner.os != 'Windows'
        run: ./target/debug/lockbox __agent_security_check

      - name: Verify Windows agent transport security
        if: runner.os == 'Windows'
        run: .\target\debug\lockbox.exe __agent_security_check
