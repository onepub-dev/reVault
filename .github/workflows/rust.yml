name: Rust

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LOCKBOX_COMPRESSION_CORPUS_VERSION: v1

on:
  push:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-msrv:
    name: Public APIs / Rust 1.95
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: api-msrv-1.95

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Check public APIs at MSRV
        run: >-
          cargo check
          -p revault_page_api@0.0.2
          -p revault_lockbox_api@0.0.3
          -p revault_vault_api@0.0.3
          --all-targets
          --locked

      - name: Check published Rust binding at MSRV
        run: cargo check --manifest-path ../bindings/rust/Cargo.toml

  tooling-msrv:
    name: Tooling / Rust 1.95
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: msrv-1.95

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Check workspace at MSRV
        run: cargo check --workspace --all-targets --locked

  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Required checks
        run: cargo xtask check-required

      - name: Agent IPC smoke test
        run: cargo test -p revault_cli --test agent_flow -- --nocapture

      - name: Check fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml

  portable-core:
    name: core ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-linux-android
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
          - os: ubuntu-latest
            target: wasm32-wasip2
          - os: macos-latest
            target: aarch64-apple-ios

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: portable-core-${{ matrix.target }}

      - name: Check core
        run: cargo check -p revault_lockbox_api --target ${{ matrix.target }}

      - name: Check secure tests
        if: matrix.target != 'wasm32-unknown-unknown'
        run: cargo check -p revault_page_api --target ${{ matrix.target }} --tests

      - name: Check secure web library
        if: matrix.target == 'wasm32-unknown-unknown'
        run: cargo check -p revault_page_api --target ${{ matrix.target }} --lib

  compression-regression:
    name: compression regression corpus
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore compression corpus
        id: compression-corpus-cache
        uses: actions/cache@v4
        with:
          path: rust/.ci-compression-corpus
          key: lockbox-compression-corpus-${{ env.LOCKBOX_COMPRESSION_CORPUS_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: compression-regression

      - name: Generate compression corpus
        if: steps.compression-corpus-cache.outputs.cache-hit != 'true'
        run: cargo bench -p revault_lockbox_api --bench compression_corpus -- .ci-compression-corpus

      - name: Run compression regression corpus
        env:
          LOCKBOX_COMPRESSION_CORPUS_DIR: ${{ github.workspace }}/rust/.ci-compression-corpus
        run: cargo test --release -p revault_lockbox_api compression_regression_tests -- --ignored --nocapture

  network-integration:
    name: network integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: network-integration

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Run ignored network tests
        run: cargo xtask run-network-tests
