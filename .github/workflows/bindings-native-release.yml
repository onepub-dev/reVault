name: bindings native release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without a leading v
        required: true
        type: string
  push:
    tags:
      - revault-api-v*

permissions:
  contents: read

jobs:
  package-matrix:
    name: define 94 claimed package combinations
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - id: matrix
        shell: bash
        run: echo "value=$(cargo run --locked --quiet --manifest-path rust/Cargo.toml -p revault_tooling -- e2e matrix-json)" >> "$GITHUB_OUTPUT"

  conformance:
    name: 16 installed Linux APIs and 480 interoperability paths
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run exhaustive package E2E matrix
        working-directory: rust
        run: cargo run --locked -p revault_tooling -- e2e matrix --compose ../bindings/e2e/compose.yaml

  native:
    name: native ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64-gnu
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            library: librevault_api.so
            static_library: librevault_api.a
          - target: linux-aarch64-gnu
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            library: librevault_api.so
            static_library: librevault_api.a
          - target: macos-x86_64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            library: librevault_api.dylib
            static_library: librevault_api.a
          - target: macos-aarch64
            runner: macos-15
            rust_target: aarch64-apple-darwin
            library: librevault_api.dylib
            static_library: librevault_api.a
          - target: windows-x86_64-msvc
            runner: windows-2025
            rust_target: x86_64-pc-windows-msvc
            library: revault_api.dll
            static_library: revault_api.lib
          - target: windows-aarch64-msvc
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            library: revault_api.dll
            static_library: revault_api.lib
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.rust_target }}
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: ${{ matrix.target == 'windows-aarch64-msvc' && 'arm64' || 'x64' }}
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: choco install protoc --yes --no-progress
      - name: Build release library
        working-directory: rust
        run: cargo build --locked --release --target ${{ matrix.rust_target }} -p revault_bindings
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#revault-api-v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Package native ABI
        shell: bash
        run: |
          cargo run --locked --manifest-path rust/Cargo.toml -p revault_tooling -- release package-native \
            --repository . \
            --version "${{ steps.version.outputs.value }}" \
            --target "${{ matrix.target }}" \
            --library "rust/target/${{ matrix.rust_target }}/release/${{ matrix.library }}" \
            --static-library "rust/target/${{ matrix.rust_target }}/release/${{ matrix.static_library }}" \
            --output dist
      - name: Install archive and run all 210 native operations
        shell: bash
        run: >-
          cargo run --locked --manifest-path rust/Cargo.toml -p revault_tooling --
          e2e native-conformance
          --archive "dist/revault-api-native-${{ steps.version.outputs.value }}-${{ matrix.target }}.${{ startsWith(matrix.target, 'windows-') && 'zip' || 'tar.gz' }}"
          --repository .
          --work native-conformance
      - name: Attest native archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  macos-xcframework:
    needs: native
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: native-macos-*
          path: native
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Build universal Swift binary target
        run: >-
          cargo run --locked --manifest-path rust/Cargo.toml -p revault_tooling --
          release package-xcframework
          --x86-64-archive native/native-macos-x86_64/revault-api-native-*-macos-x86_64.tar.gz
          --aarch64-archive native/native-macos-aarch64/revault-api-native-*-macos-aarch64.tar.gz
          --output dist
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/RevaultC.xcframework.zip
      - uses: actions/upload-artifact@v4
        with:
          name: swift-macos-xcframework
          path: dist/RevaultC.xcframework.zip*
          if-no-files-found: error

  package-conformance:
    name: ${{ matrix.language }} installed package on ${{ matrix.target }}
    needs: [package-matrix, native, ecosystem-layouts]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.package-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: native
      - uses: actions/download-artifact@v4
        with:
          name: revault-api-publication-trees
          path: packages
      - uses: actions/setup-node@v4
        if: contains(fromJSON('["javascript","typescript","wasm"]'), matrix.language)
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        if: matrix.language == 'python'
        with:
          python-version: '3.13'
      - uses: actions/setup-java@v4
        if: contains(fromJSON('["java","kotlin"]'), matrix.language)
        with:
          distribution: temurin
          java-version: '22'
      - uses: gradle/actions/setup-gradle@v4
        if: contains(fromJSON('["java","kotlin"]'), matrix.language)
        with:
          gradle-version: '8.10'
      - uses: actions/setup-dotnet@v4
        if: matrix.language == 'csharp'
        with:
          dotnet-version: '8.0.x'
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows' && contains(fromJSON('["c","cpp"]'), matrix.language)
        with:
          arch: ${{ matrix.target == 'windows-aarch64-msvc' && 'arm64' || 'x64' }}
      - uses: dart-lang/setup-dart@v1
        if: matrix.language == 'dart'
      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: '1.24.x'
      - uses: ruby/setup-ruby@v1
        if: matrix.language == 'ruby'
        with:
          ruby-version: '3.3'
      - uses: shivammathur/setup-php@v2
        if: matrix.language == 'php'
        with:
          php-version: '8.3'
          extensions: ffi
          tools: composer:v2
      - uses: leafo/gh-actions-lua@v11
        if: matrix.language == 'lua'
        with:
          luaVersion: luajit-2.1
      - uses: leafo/gh-actions-luarocks@v5
        if: matrix.language == 'lua'
      - uses: swift-actions/setup-swift@v2
        if: matrix.language == 'swift' && runner.os == 'Linux'
        with:
          swift-version: '6.1'
      - name: Install Linux service and build dependencies
        if: runner.os == 'Linux' && matrix.language != 'rust'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake dbus-x11 gnome-keyring libsecret-tools libdbus-1-3 libprotobuf-dev protobuf-compiler
      - name: Install macOS C++ dependencies
        if: runner.os == 'macOS' && matrix.language == 'cpp'
        run: brew install protobuf
      - name: Install Windows x64 C++ dependencies
        if: runner.os == 'Windows' && matrix.language == 'cpp' && matrix.target == 'windows-x86_64-msvc'
        shell: pwsh
        run: |
          vcpkg install protobuf:x64-windows
          "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
      - name: Install Windows ARM64 C++ dependencies
        if: runner.os == 'Windows' && matrix.language == 'cpp' && matrix.target == 'windows-aarch64-msvc'
        shell: pwsh
        run: |
          vcpkg install protobuf:arm64-windows
          "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
      - name: Install Lua Protobuf dependency
        if: matrix.language == 'lua'
        run: luarocks install lua-protobuf
      - name: Install Ruby Protobuf dependency
        if: matrix.language == 'ruby'
        run: gem install google-protobuf -v '~> 3.25' --no-document
      - name: Install, unpack and exercise the claimed package
        run: >-
          cargo run --locked --manifest-path rust/Cargo.toml -p revault_tooling --
          e2e package-conformance
          --language "${{ matrix.language }}"
          --target "${{ matrix.target }}"
          --archive native
          --packages packages
          --repository .
          --work "package-conformance-${{ matrix.language }}-${{ matrix.target }}"

  github-release:
    if: github.ref_type == 'tag'
    needs: [native, macos-xcframework, ecosystem-layouts, package-conformance, conformance]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: swift-macos-xcframework
          path: dist
      - name: Publish immutable native archives
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  ecosystem-layouts:
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native
          merge-multiple: true
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#revault-api-v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Stage registry-native layouts
        run: >-
          cargo run --locked --manifest-path rust/Cargo.toml -p revault_tooling --
          release stage-ecosystems --repository .
          --version "${{ steps.version.outputs.value }}"
          --output ecosystem
          native/revault-api-native-*.tar.gz
          native/revault-api-native-*.zip
      - name: Assemble complete registry packages
        run: >-
          cargo run --locked --manifest-path rust/Cargo.toml -p revault_tooling --
          release assemble-packages
          --version "${{ steps.version.outputs.value }}"
          --layout ecosystem
          --source .
          --output packages
      - uses: actions/upload-artifact@v4
        with:
          name: ecosystem-native-layouts
          path: ecosystem
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: revault-api-publication-trees
          path: packages
          if-no-files-found: error
